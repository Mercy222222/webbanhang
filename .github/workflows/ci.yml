name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'blog-template/package-lock.json'

      - name: Install dependencies
        working-directory: ./blog-template
        run: npm ci

      - name: Build test
        working-directory: ./blog-template
        run: npm run build
